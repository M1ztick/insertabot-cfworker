<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>InsertaBot</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg: #080b12;
				--surface: #0e1320;
				--surface2: #141a2e;
				--border: rgba(255, 255, 255, 0.07);
				--border-cyan: rgba(0, 245, 212, 0.3);
				--border-magenta: rgba(245, 0, 160, 0.35);
				--text: #e8eaf2;
				--text-muted: #6b7399;
				--cyan: #00f5d4;
				--magenta: #f500a0;
				--accent: #00f5d4;
				--accent-dim: rgba(0, 245, 212, 0.12);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				block-size: 100%;
				overflow: hidden;
			}

			body {
				font-family:
					'Syne',
					-apple-system,
					BlinkMacSystemFont,
					sans-serif;
				background: var(--bg);
				color: var(--text);
				display: flex;
				flex-direction: column;
			}

			/* ── Grid background ── */
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background-image:
					linear-gradient(rgba(0, 245, 212, 0.025) 1px, transparent 1px),
					linear-gradient(90deg, rgba(0, 245, 212, 0.025) 1px, transparent 1px);
				background-size: 40px 40px;
				pointer-events: none;
				z-index: 0;
			}

			/* ── Header ── */
			header {
				position: relative;
				z-index: 1;
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 14px 20px;
				border-block-end: 1px solid var(--border);
				background: var(--surface);
				flex-shrink: 0;
			}

			header svg {
				flex-shrink: 0;
			}

			header h1 {
				font-family: 'Space Mono', monospace;
				font-size: 0.85rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--text);
			}

			.status {
				margin-inline-start: auto;
				display: flex;
				align-items: center;
				gap: 6px;
				font-family: 'Space Mono', monospace;
				font-size: 0.72rem;
				color: var(--text-muted);
			}

			.dot {
				inline-size: 7px;
				block-size: 7px;
				border-radius: 50%;
				background: #333;
				transition: background 0.4s;
			}
			.dot.on {
				background: var(--cyan);
				box-shadow: 0 0 8px rgba(0, 245, 212, 0.5);
			}

			/* ── Plan badge ── */
			.plan-badge {
				display: inline-flex;
				align-items: center;
				gap: 5px;
				font-family: 'Space Mono', monospace;
				font-size: 0.65rem;
				font-weight: 700;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				padding: 3px 8px;
				border-radius: 20px;
				border: 1px solid;
				white-space: nowrap;
			}
			.plan-badge.demo  { color: var(--cyan);    border-color: rgba(0,245,212,0.35);  background: rgba(0,245,212,0.07); }
			.plan-badge.light { color: var(--text-muted); border-color: var(--border);       background: transparent; }
			.plan-badge.plus  { color: #a78bfa;          border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.08); }
			.plan-badge.agent { color: var(--magenta);   border-color: var(--border-magenta); background: rgba(245,0,160,0.07); }

			/* ── Demo banner ── */
			.demo-banner {
				display: none;
				position: relative;
				z-index: 1;
				background: rgba(0, 245, 212, 0.06);
				border-block-end: 1px solid rgba(0, 245, 212, 0.15);
				padding: 7px 20px;
				text-align: center;
				font-family: 'Space Mono', monospace;
				font-size: 0.68rem;
				color: var(--text-muted);
				flex-shrink: 0;
			}
			.demo-banner a { color: var(--cyan); text-decoration: none; }
			.demo-banner a:hover { text-decoration: underline; }
			.demo-banner.visible { display: block; }

			.btn-ghost {
				background: none;
				border: 1px solid var(--border);
				border-radius: 8px;
				color: var(--text-muted);
				font-family: 'Space Mono', monospace;
				font-size: 0.72rem;
				padding: 5px 11px;
				cursor: pointer;
				transition:
					border-color 0.2s,
					color 0.2s;
				white-space: nowrap;
				letter-spacing: 0.05em;
			}
			.btn-ghost:hover {
				border-color: var(--border-cyan);
				color: var(--cyan);
			}

			/* ── Messages ── */
			#messages {
				flex: 1;
				position: relative;
				z-index: 1;
				overflow-y: auto;
				padding: 28px 16px 12px;
				display: flex;
				flex-direction: column;
				gap: 18px;
				scrollbar-width: thin;
				scrollbar-color: var(--border) transparent;
			}

			.empty-state {
				margin: auto;
				text-align: center;
				color: var(--text-muted);
				user-select: none;
			}

			.empty-state h2 {
				font-family: 'Space Mono', monospace;
				font-size: 1.3rem;
				font-weight: 700;
				letter-spacing: 0.08em;
				color: var(--cyan);
				margin-block-end: 12px;
				text-shadow: 0 0 20px rgba(0, 245, 212, 0.3);
			}

			.empty-state p {
				font-size: 0.88rem;
				line-height: 1.7;
				max-inline-size: 320px;
				color: var(--text-muted);
			}

			.msg-row {
				display: flex;
				gap: 10px;
				max-inline-size: 720px;
				inline-size: 100%;
				margin: 0 auto;
				animation: slide-in 0.18s ease;
			}

			@keyframes slide-in {
				from {
					opacity: 0;
					transform: translateY(6px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}

			.msg-row.user {
				flex-direction: row-reverse;
			}

			.avatar {
				inline-size: 30px;
				block-size: 30px;
				border-radius: 50%;
				flex-shrink: 0;
				font-family: 'Space Mono', monospace;
				font-size: 0.65rem;
				font-weight: 700;
				display: flex;
				align-items: center;
				justify-content: center;
				margin-block-start: 2px;
			}

			.msg-row.user .avatar {
				background: var(--accent-dim);
				border: 1px solid var(--border-cyan);
				color: var(--cyan);
			}

			.msg-row.assistant .avatar {
				background: var(--surface2);
				border: 1px solid var(--border);
				color: var(--text-muted);
			}

			.bubble {
				padding: 10px 14px;
				border-radius: 12px;
				line-height: 1.7;
				font-size: 0.9rem;
				max-inline-size: calc(100% - 44px);
				word-break: break-word;
			}

			.msg-row.user .bubble {
				background: var(--surface2);
				border: 1px solid var(--border-cyan);
				white-space: pre-wrap;
			}

			.msg-row.assistant .bubble {
				background: var(--surface2);
				border: 1px solid var(--border);
			}

			/* Markdown rendered content */
			.bubble-content p {
				margin-block-end: 0.6em;
			}
			.bubble-content p:last-child {
				margin-block-end: 0;
			}
			.bubble-content ul,
			.bubble-content ol {
				padding-inline-start: 1.4em;
				margin-block-end: 0.6em;
			}
			.bubble-content li {
				margin-block-end: 0.25em;
			}
			.bubble-content strong {
				color: var(--text);
				font-weight: 700;
			}
			.bubble-content em {
				color: var(--text-muted);
			}
			.bubble-content code {
				font-family: 'Space Mono', monospace;
				font-size: 0.8em;
				background: rgba(0, 245, 212, 0.08);
				border: 1px solid rgba(0, 245, 212, 0.15);
				border-radius: 4px;
				padding: 1px 5px;
				color: var(--cyan);
			}
			.bubble-content pre {
				background: var(--bg);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 12px;
				overflow-x: auto;
				margin-block: 0.6em;
			}
			.bubble-content pre code {
				background: none;
				border: none;
				padding: 0;
				font-size: 0.82em;
				color: var(--text);
			}
			.bubble-content h1,
			.bubble-content h2,
			.bubble-content h3 {
				font-family: 'Space Mono', monospace;
				letter-spacing: 0.04em;
				margin-block: 0.8em 0.4em;
				color: var(--text);
			}
			.bubble-content h1 {
				font-size: 1.1em;
			}
			.bubble-content h2 {
				font-size: 1em;
			}
			.bubble-content h3 {
				font-size: 0.95em;
				color: var(--text-muted);
			}
			.bubble-content a {
				color: var(--cyan);
				text-decoration: none;
			}
			.bubble-content a:hover {
				text-decoration: underline;
			}
			.bubble-content blockquote {
				border-inline-start: 2px solid var(--border-cyan);
				padding-inline-start: 12px;
				color: var(--text-muted);
				margin-block: 0.6em;
			}
			.bubble-content hr {
				border: none;
				border-block-start: 1px solid var(--border);
				margin-block: 0.8em;
			}
			.bubble-content table {
				inline-size: 100%;
				border-collapse: collapse;
				font-size: 0.85em;
				margin-block: 0.6em;
			}
			.bubble-content th,
			.bubble-content td {
				padding: 6px 10px;
				border: 1px solid var(--border);
				text-align: start;
			}
			.bubble-content th {
				background: var(--surface);
				font-family: 'Space Mono', monospace;
				font-size: 0.78em;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--text-muted);
			}

			.msg-img {
				max-inline-size: 100%;
				max-block-size: 260px;
				border-radius: 8px;
				display: block;
				margin-block-start: 8px;
				cursor: pointer;
				border: 1px solid var(--border);
			}

			/* Streaming cursor */
			.cursor {
				display: inline-block;
				inline-size: 2px;
				block-size: 0.9em;
				background: var(--cyan);
				margin-inline-start: 2px;
				vertical-align: text-bottom;
				animation: blink 0.9s step-end infinite;
			}
			@keyframes blink {
				50% {
					opacity: 0;
				}
			}

			/* Tool call pill */
			.tool-pill {
				display: inline-flex;
				align-items: center;
				gap: 5px;
				background: rgba(0, 245, 212, 0.07);
				border: 1px solid rgba(0, 245, 212, 0.2);
				border-radius: 6px;
				padding: 3px 9px;
				font-family: 'Space Mono', monospace;
				font-size: 0.72rem;
				color: var(--cyan);
				margin: 4px 0;
				opacity: 0.75;
			}

			.tool-pill::before {
				content: '⚙';
				font-size: 0.7rem;
			}

			/* ── Input area ── */
			.input-wrap {
				position: relative;
				z-index: 1;
				flex-shrink: 0;
				background: var(--surface);
				border-block-start: 1px solid var(--border);
				padding: 10px 16px 14px;
			}

			#preview-strip {
				display: none;
				flex-direction: row;
				flex-wrap: wrap;
				gap: 8px;
				max-inline-size: 720px;
				margin: 0 auto 10px;
			}

			.preview-thumb {
				position: relative;
			}

			.preview-thumb img {
				block-size: 60px;
				inline-size: 60px;
				object-fit: cover;
				border-radius: 8px;
				border: 1px solid var(--border-cyan);
				display: block;
			}

			.preview-remove {
				position: absolute;
				inset-block-start: -6px;
				inset-inline-end: -6px;
				inline-size: 18px;
				block-size: 18px;
				background: var(--surface2);
				border: 1px solid var(--border);
				border-radius: 50%;
				color: var(--text-muted);
				font-size: 11px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0;
				line-height: 1;
				transition:
					border-color 0.2s,
					color 0.2s;
			}
			.preview-remove:hover {
				border-color: var(--magenta);
				color: var(--magenta);
			}

			.input-inner {
				max-inline-size: 720px;
				margin: 0 auto;
				display: flex;
				gap: 8px;
				align-items: flex-end;
			}

			button#attach {
				block-size: 42px;
				inline-size: 42px;
				background: var(--surface2);
				border: 1px solid var(--border);
				border-radius: 10px;
				color: var(--text-muted);
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
				transition:
					border-color 0.2s,
					color 0.2s;
			}
			button#attach:hover {
				border-color: var(--border-cyan);
				color: var(--cyan);
			}
			button#attach:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}

			textarea {
				flex: 1;
				min-block-size: 42px;
				max-block-size: 160px;
				padding: 10px 13px;
				background: var(--surface2);
				border: 1px solid var(--border);
				border-radius: 10px;
				color: var(--text);
				font-family: 'Syne', sans-serif;
				font-size: 0.9rem;
				line-height: 1.5;
				resize: none;
				outline: none;
				transition: border-color 0.2s;
			}
			textarea:focus {
				border-color: var(--border-cyan);
			}
			textarea::placeholder {
				color: var(--text-muted);
			}
			textarea:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			button#send {
				block-size: 42px;
				padding: 0 18px;
				background: var(--cyan);
				border: none;
				border-radius: 10px;
				color: var(--bg);
				font-family: 'Space Mono', monospace;
				font-size: 0.78rem;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				cursor: pointer;
				white-space: nowrap;
				transition:
					opacity 0.2s,
					box-shadow 0.2s;
				flex-shrink: 0;
			}
			button#send:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}
			button#send:not(:disabled):hover {
				opacity: 0.85;
				box-shadow: 0 0 16px rgba(0, 245, 212, 0.3);
			}

			/* ── Add-ons panel ── */
			.addons-backdrop {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.55);
				z-index: 50;
			}
			.addons-backdrop.open { display: block; }

			.addons-panel {
				position: fixed;
				inset-block: 0;
				inset-inline-end: 0;
				inline-size: 320px;
				max-inline-size: 100vw;
				background: var(--surface);
				border-inline-start: 1px solid var(--border);
				z-index: 51;
				display: flex;
				flex-direction: column;
				transform: translateX(100%);
				transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.addons-panel.open { transform: translateX(0); }

			.addons-header {
				display: flex;
				align-items: center;
				padding: 14px 18px;
				border-block-end: 1px solid var(--border);
				flex-shrink: 0;
				gap: 8px;
			}
			.addons-title {
				font-family: 'Space Mono', monospace;
				font-size: 0.78rem;
				font-weight: 700;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--text);
				flex: 1;
			}
			.addons-close {
				background: none;
				border: none;
				color: var(--text-muted);
				font-size: 1.1rem;
				cursor: pointer;
				padding: 3px 6px;
				line-height: 1;
				border-radius: 6px;
				transition: color 0.2s;
			}
			.addons-close:hover { color: var(--text); }

			.addons-body {
				flex: 1;
				overflow-y: auto;
				padding: 18px;
				display: flex;
				flex-direction: column;
				gap: 22px;
				scrollbar-width: thin;
				scrollbar-color: var(--border) transparent;
			}

			.addons-section-title {
				font-family: 'Space Mono', monospace;
				font-size: 0.66rem;
				font-weight: 700;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--text-muted);
				margin-block-end: 10px;
			}

			.addons-empty {
				color: var(--text-muted);
				font-size: 0.82rem;
				text-align: center;
				padding: 12px 0;
				line-height: 1.6;
			}

			.server-card {
				background: var(--surface2);
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 12px 14px;
				margin-block-end: 8px;
			}
			.server-card:last-child { margin-block-end: 0; }

			.server-card-top {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-block-end: 8px;
			}

			.server-status-dot {
				inline-size: 8px;
				block-size: 8px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.server-status-dot.ready {
				background: var(--cyan);
				box-shadow: 0 0 6px rgba(0, 245, 212, 0.4);
			}
			.server-status-dot.connecting {
				background: #f5b800;
				animation: pulse-dot 1s step-end infinite;
			}
			.server-status-dot.failed { background: var(--magenta); }
			.server-status-dot.authenticating { background: #f57800; }
			.server-status-dot.other { background: #555; }
			@keyframes pulse-dot { 50% { opacity: 0.35; } }

			.server-name {
				font-family: 'Space Mono', monospace;
				font-size: 0.78rem;
				font-weight: 700;
				color: var(--text);
				flex: 1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.server-disconnect {
				background: none;
				border: 1px solid var(--border);
				border-radius: 6px;
				color: var(--text-muted);
				font-family: 'Space Mono', monospace;
				font-size: 0.62rem;
				padding: 3px 9px;
				cursor: pointer;
				transition:
					border-color 0.2s,
					color 0.2s;
				white-space: nowrap;
				flex-shrink: 0;
			}
			.server-disconnect:hover:not(:disabled) {
				border-color: var(--border-magenta);
				color: var(--magenta);
			}
			.server-disconnect:disabled { opacity: 0.4; cursor: not-allowed; }

			.server-error {
				font-size: 0.74rem;
				color: var(--magenta);
				margin-block-end: 6px;
				line-height: 1.4;
			}

			.addons-auth-link {
				display: inline-block;
				font-family: 'Space Mono', monospace;
				font-size: 0.7rem;
				color: #f57800;
				text-decoration: none;
				margin-block-end: 6px;
			}
			.addons-auth-link:hover { text-decoration: underline; }

			.server-tools {
				display: flex;
				flex-wrap: wrap;
				gap: 5px;
			}
			.tool-chip {
				font-family: 'Space Mono', monospace;
				font-size: 0.62rem;
				background: rgba(0, 245, 212, 0.06);
				border: 1px solid rgba(0, 245, 212, 0.14);
				border-radius: 5px;
				padding: 2px 7px;
				color: var(--text-muted);
				cursor: default;
			}

			/* Connect form */
			.addons-form {
				display: flex;
				flex-direction: column;
				gap: 12px;
			}
			.addons-field label {
				font-family: 'Space Mono', monospace;
				font-size: 0.64rem;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--text-muted);
				display: block;
				margin-block-end: 5px;
			}
			.addons-field input {
				inline-size: 100%;
				padding: 9px 12px;
				background: var(--surface2);
				border: 1px solid var(--border);
				border-radius: 8px;
				color: var(--text);
				font-family: 'Syne', sans-serif;
				font-size: 0.85rem;
				outline: none;
				transition: border-color 0.2s;
			}
			.addons-field input:focus { border-color: var(--border-cyan); }
			.addons-field input::placeholder { color: var(--text-muted); }

		</style>

	<body>
		<header>
			<svg

					<path d="M12 22v-5"/>

		<div class="demo-banner" id="demo-banner">

		<div class="addons-backdrop" id="addons-backdrop"></div>

			<div class="addons-body">
				<section>

					</div>

				<section>
					<p class="addons-section-title">Connect a server</p>
					<div class="addons-form">
						<div class="addons-field">

		</aside>

		<div id="messages"></div>

		<div id="lightbox"><img id="lightbox-img" src="" alt="" /></div>

		<div class="input-wrap">
			<div id="preview-strip"></div>
			<div class="input-inner">
				<button id="attach" title="Attach image" disabled>
					<svg
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
					</svg>
				</button>
				<input type="file" id="file-input" accept="image/*" multiple hidden />
				<textarea id="input" placeholder="Message InsertaBot…" rows="1" disabled></textarea>
				<button id="send" disabled>Send</button>
			</div>
		</div>

		<script>
			// ── Config ────────────────────────────────────────────────────────────────
			const EMPTY_TITLE = 'InsertaBot';
			const EMPTY_SUBTITLE = 'Your AI web presence assistant. Ask anything, attach images, or let me handle tasks for you.';

			// ── Inline markdown renderer (no external deps, line-by-line) ──────────────
			function renderMarkdown(text) {
				const div = document.createElement('div');
				div.className = 'bubble-content';

				function escHtml(s) {
					return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
				}

				function parseInline(s) {
					return escHtml(s)
						.replace(/`([^`]+)`/g, '<code>$1</code>')
						.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
						.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
						.replace(/__(.+?)__/g, '<strong>$1</strong>')
						.replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
						.replace(/_([^_\n]+)_/g, '<em>$1</em>')
						.replace(/~~(.+?)~~/g, '<del>$1</del>')
						.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
				}

				function flushPara(lines) {
					if (!lines.length) return;
					const p = document.createElement('p');
					p.innerHTML = parseInline(lines.join(' '));
					div.appendChild(p);
				}

				function flushList(items, ordered) {
					if (!items.length) return;
					const list = document.createElement(ordered ? 'ol' : 'ul');
					for (const item of items) {
						const li = document.createElement('li');
						li.innerHTML = parseInline(item);
						list.appendChild(li);
					}
					div.appendChild(list);
				}

				const lines = text.split('\n');
				let i = 0;
				let paraLines = [];
				let listItems = [];
				let listOrdered = false;

				function commitPending() {
					if (listItems.length) {
						flushList(listItems, listOrdered);
						listItems = [];
					}
					if (paraLines.length) {
						flushPara(paraLines);
						paraLines = [];
					}
				}

				while (i < lines.length) {
					const line = lines[i];

					// Fenced code block
					if (line.startsWith('```')) {
						commitPending();
						const pre = document.createElement('pre');
						const code = document.createElement('code');
						const codeLines = [];
						i++;
						while (i < lines.length && !lines[i].startsWith('```')) {
							codeLines.push(escHtml(lines[i]));
							i++;
						}
						code.innerHTML = codeLines.join('\n');
						pre.appendChild(code);
						div.appendChild(pre);
						i++;
						continue;
					}

					// Heading
					const hm = line.match(/^(#{1,3})\s+(.*)/);
					if (hm) {
						commitPending();
						const el = document.createElement(`h${hm[1].length}`);
						el.innerHTML = parseInline(hm[2]);
						div.appendChild(el);
						i++;
						continue;
					}

					// Horizontal rule
					if (/^[-*_]{3,}\s*$/.test(line)) {
						commitPending();
						div.appendChild(document.createElement('hr'));
						i++;
						continue;
					}

					// Blockquote
					if (line.startsWith('> ')) {
						commitPending();
						const bq = document.createElement('blockquote');
						const bqLines = [];
						while (i < lines.length && lines[i].startsWith('> ')) {
							bqLines.push(lines[i].slice(2));
							i++;
						}
						bq.innerHTML = parseInline(bqLines.join(' '));
						div.appendChild(bq);
						continue;
					}

					// Blank line — flush current context
					if (line.trim() === '') {
						commitPending();
						i++;
						continue;
					}

					// Unordered list item
					const ulm = line.match(/^[-*+]\s+(.*)/);
					if (ulm) {
						if (paraLines.length) {
							flushPara(paraLines);
							paraLines = [];
						}
						if (listItems.length && listOrdered) {
							flushList(listItems, true);
							listItems = [];
						}
						listOrdered = false;
						listItems.push(ulm[1]);
						i++;
						continue;
					}

					// Ordered list item
					const olm = line.match(/^\d+\.\s+(.*)/);
					if (olm) {
						if (paraLines.length) {
							flushPara(paraLines);
							paraLines = [];
						}
						if (listItems.length && !listOrdered) {
							flushList(listItems, false);
							listItems = [];
						}
						listOrdered = true;
						listItems.push(olm[1]);
						i++;
						continue;
					}

					// Regular text — flush any open list first, then accumulate paragraph
					if (listItems.length) {
						flushList(listItems, listOrdered);
						listItems = [];
					}
					paraLines.push(line);
					i++;
				}

				commitPending();
				return div;
			}

			// ── DOM refs ──────────────────────────────────────────────────────────────
			const msgList = document.getElementById('messages');
			const inputEl = document.getElementById('input');
			const sendBtn = document.getElementById('send');
			const attachBtn = document.getElementById('attach');
			const fileInputEl = document.getElementById('file-input');
			const previewStrip = document.getElementById('preview-strip');
			const newChatBtn = document.getElementById('new-chat');
			const dot = document.getElementById('dot');
			const statusTxt = document.getElementById('status-text');
			const lightbox = document.getElementById('lightbox');
			const lightboxImg = document.getElementById('lightbox-img');

			// ── Session ───────────────────────────────────────────────────────────────
			let instanceId = localStorage.getItem('ib_instance');
			if (!instanceId) {
				instanceId = crypto.randomUUID();
				localStorage.setItem('ib_instance', instanceId);
			}

			// ── State ─────────────────────────────────────────────────────────────────
			let messages = [];
			let pendingImages = [];
			let streaming = null;
			let busy = false;
			let ws = null;
			let retryDelay = 1000;

			// ── Add-ons state ─────────────────────────────────────────────────────────
			let addonsOpen = false;
			const pendingRpc = new Map();

			// ── Empty state ───────────────────────────────────────────────────────────
			function buildEmptyState() {
				const div = document.createElement('div');
				div.className = 'empty-state';
				div.id = 'empty';
				div.innerHTML = `<h2>${EMPTY_TITLE}</h2><p>${EMPTY_SUBTITLE}</p>`;
				return div;
			}

			function showEmpty() {
				if (!document.getElementById('empty')) {
					msgList.appendChild(buildEmptyState());
				}
			}

			function hideEmpty() {
				const el = document.getElementById('empty');
				if (el) el.remove();
			}

			// ── UI helpers ────────────────────────────────────────────────────────────
			function setConnected(yes) {
				dot.className = 'dot' + (yes ? ' on' : '');
				statusTxt.textContent = yes ? 'Connected' : 'Reconnecting…';
				inputEl.disabled = !yes || busy;
				sendBtn.disabled = !yes || busy;
				attachBtn.disabled = !yes || busy;
			}

			function setBusy(yes) {
				busy = yes;
				inputEl.disabled = yes;
				sendBtn.disabled = yes;
				attachBtn.disabled = yes;
			}

			function scrollBottom() {
				msgList.scrollTop = msgList.scrollHeight;
			}

			function esc(s) {
				return String(s ?? '')
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;');
			}

			function addRow(role, id) {
				hideEmpty();
				const row = document.createElement('div');
				row.className = `msg-row ${role}`;
				row.dataset.id = id;
				const avatar = document.createElement('div');
				avatar.className = 'avatar';
				avatar.textContent = role === 'user' ? 'You' : 'AI';
				const bubble = document.createElement('div');
				bubble.className = 'bubble';
				row.appendChild(avatar);
				row.appendChild(bubble);
				msgList.appendChild(row);
				scrollBottom();
				return bubble;
			}

			function extractText(msg) {
				if (Array.isArray(msg.parts)) {
					const txt = msg.parts
						.filter((p) => p.type === 'text')
						.map((p) => p.text)
						.join('');
					if (txt) return txt;
				}
				if (typeof msg.content === 'string') return msg.content;
				return '';
			}

			function setBubbleContent(bubbleEl, msg) {
				bubbleEl.innerHTML = '';
				const text = extractText(msg);
				if (text) {
					if (msg.role === 'assistant') {
						bubbleEl.appendChild(renderMarkdown(text));
					} else {
						const span = document.createElement('span');
						span.textContent = text;
						bubbleEl.appendChild(span);
					}
				}
				const fileParts = Array.isArray(msg.parts) ? msg.parts.filter((p) => p.type === 'file') : [];
				for (const fp of fileParts) {
					const img = document.createElement('img');
					img.src = fp.url;
					img.className = 'msg-img';
					img.alt = fp.filename ?? 'image';
					img.addEventListener('click', () => openLightbox(fp.url));
					bubbleEl.appendChild(img);
				}
			}

			// Tool call pill
			function addToolPill(name) {
				if (!streaming) return;
				const pill = document.createElement('div');
				pill.className = 'tool-pill';
				pill.textContent = name;
				streaming.bubbleEl.appendChild(pill);
				scrollBottom();
			}

			// Re-render all persisted messages
			function renderAll() {
				msgList.innerHTML = '';
				if (messages.length === 0) {
					showEmpty();
					return;
				}
				for (const m of messages) {
					const bubble = addRow(m.role, m.id);
					setBubbleContent(bubble, m);
				}
				scrollBottom();
			}

			// ── Lightbox ──────────────────────────────────────────────────────────────
			function openLightbox(src) {
				lightboxImg.src = src;
				lightbox.classList.add('open');
			}
			lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

			// ── Add-ons panel ─────────────────────────────────────────────────────────
			function toggleAddons() {
				addonsOpen = !addonsOpen;
				document.getElementById('addons-backdrop').classList.toggle('open', addonsOpen);
				document.getElementById('addons-panel').classList.toggle('open', addonsOpen);
			}

			function callRpc(method, args) {
				return new Promise((resolve, reject) => {
					if (!ws || ws.readyState !== WebSocket.OPEN) {
						reject(new Error('Not connected'));
						return;
					}
					const id = crypto.randomUUID();
					pendingRpc.set(id, { resolve, reject });
					ws.send(JSON.stringify({ type: 'rpc', id, method, args }));
					setTimeout(() => {
						if (pendingRpc.has(id)) {
							pendingRpc.delete(id);
							reject(new Error('Request timed out'));
						}
					}, 15000);
				});
			}

			function dotClass(state) {
				if (state === 'ready') return 'ready';
				if (state === 'connecting') return 'connecting';
				if (state === 'failed') return 'failed';
				if (state === 'authenticating') return 'authenticating';
				return 'other';
			}

			function renderAddons(mcp) {
				if (!mcp) return;
				const serversEl = document.getElementById('addons-servers');
				const servers = mcp.servers ?? {};
				const tools = Array.isArray(mcp.tools) ? mcp.tools : [];
				const entries = Object.entries(servers);

				serversEl.innerHTML = '';
				if (entries.length === 0) {
					const empty = document.createElement('p');
					empty.className = 'addons-empty';
					empty.textContent = 'No servers connected yet.';
					serversEl.appendChild(empty);
					return;
				}

				for (const [id, srv] of entries) {
					const serverTools = tools.filter((t) => t.serverId === id);
					const card = document.createElement('div');
					card.className = 'server-card';

					const top = document.createElement('div');
					top.className = 'server-card-top';

					const dot = document.createElement('span');
					dot.className = `server-status-dot ${dotClass(srv.state)}`;
					dot.title = srv.state ?? '';

					const nameEl = document.createElement('span');
					nameEl.className = 'server-name';
					nameEl.title = srv.server_url ?? '';
					nameEl.textContent = srv.name ?? id;

					const disconnectBtn = document.createElement('button');
					disconnectBtn.className = 'server-disconnect';
					disconnectBtn.textContent = 'Remove';
					disconnectBtn.addEventListener('click', async () => {
						disconnectBtn.disabled = true;
						disconnectBtn.textContent = '…';
						try { await callRpc('removeServer', [id]); } catch {}
						disconnectBtn.disabled = false;
						disconnectBtn.textContent = 'Remove';
					});

					top.appendChild(dot);
					top.appendChild(nameEl);
					top.appendChild(disconnectBtn);
					card.appendChild(top);

					if (srv.error) {
						const errEl = document.createElement('div');
						errEl.className = 'server-error';
						errEl.textContent = srv.error;
						card.appendChild(errEl);
					}

					if (srv.state === 'authenticating' && srv.auth_url) {
						const authLink = document.createElement('a');
						authLink.href = srv.auth_url;
						authLink.target = '_blank';
						authLink.rel = 'noopener noreferrer';
						authLink.className = 'addons-auth-link';
						authLink.textContent = 'Authorize to continue →';
						card.appendChild(authLink);
					}

					if (serverTools.length > 0) {
						const toolsEl = document.createElement('div');
						toolsEl.className = 'server-tools';
						for (const t of serverTools) {
							const chip = document.createElement('span');
							chip.className = 'tool-chip';
							chip.title = t.description ?? '';
							chip.textContent = t.name;
							toolsEl.appendChild(chip);
						}
						card.appendChild(toolsEl);
					} else if (srv.state === 'ready') {
						const toolsEl = document.createElement('div');
						toolsEl.className = 'server-tools';
						const chip = document.createElement('span');
						chip.className = 'tool-chip';
						chip.style.opacity = '0.4';
						chip.textContent = 'No tools exposed';
						toolsEl.appendChild(chip);
						card.appendChild(toolsEl);
					}

					serversEl.appendChild(card);
				}
			}

			async function connectServer() {
				const nameInput = document.getElementById('addons-name');
				const urlInput = document.getElementById('addons-url');
				const tokenInput = document.getElementById('addons-token');
				const errorEl = document.getElementById('addons-form-error');
				const connectBtn = document.getElementById('addons-connect-btn');

				const urlVal = urlInput.value.trim();
				if (!urlVal) {
					errorEl.textContent = 'Please enter a server URL.';
					return;
				}
				let parsedUrl;
				try {
					parsedUrl = new URL(urlVal);
				} catch {
					errorEl.textContent = "That doesn't look like a valid URL.";
					return;
				}
				const nameVal = nameInput.value.trim() || parsedUrl.hostname;
				const tokenVal = tokenInput.value.trim() || undefined;
				errorEl.textContent = '';
				connectBtn.disabled = true;
				connectBtn.textContent = 'Connecting…';
				try {
					await callRpc('addServer', [nameVal, urlVal, tokenVal]);
					nameInput.value = '';
					urlInput.value = '';
					tokenInput.value = '';
				} catch (e) {
					errorEl.textContent = e.message ?? 'Connection failed.';
				} finally {
					connectBtn.disabled = false;
					connectBtn.textContent = 'Connect';
				}
			}

			document.getElementById('addons-btn').addEventListener('click', toggleAddons);
			document.getElementById('addons-close').addEventListener('click', toggleAddons);
			document.getElementById('addons-backdrop').addEventListener('click', toggleAddons);
			document.getElementById('addons-connect-btn').addEventListener('click', connectServer);
			document.getElementById('addons-url').addEventListener('keydown', (e) => {
				if (e.key === 'Enter') connectServer();
			});

			// ── Image preview strip ───────────────────────────────────────────────────
			function updatePreviewStrip() {
				previewStrip.innerHTML = '';
				previewStrip.style.display = pendingImages.length ? 'flex' : 'none';
				pendingImages.forEach((img, i) => {
					const wrap = document.createElement('div');
					wrap.className = 'preview-thumb';
					const imgEl = document.createElement('img');
					imgEl.src = img.dataUrl;
					imgEl.alt = img.filename;
					const rm = document.createElement('button');
					rm.className = 'preview-remove';
					rm.textContent = '×';
					rm.title = 'Remove';
					rm.addEventListener('click', () => {
						pendingImages.splice(i, 1);
						updatePreviewStrip();
					});
					wrap.appendChild(imgEl);
					wrap.appendChild(rm);
					previewStrip.appendChild(wrap);
				});
			}

			function readFile(file) {
				return new Promise((resolve, reject) => {
					const reader = new FileReader();
					reader.onload = () => resolve({ dataUrl: reader.result, mimeType: file.type || 'image/jpeg', filename: file.name });
					reader.onerror = reject;
					reader.readAsDataURL(file);
				});
			}

			attachBtn.addEventListener('click', () => fileInputEl.click());

			fileInputEl.addEventListener('change', async () => {
				const files = Array.from(fileInputEl.files || []);
				for (const file of files) {
					if (pendingImages.length >= 4) break;
					try {
						pendingImages.push(await readFile(file));
					} catch {}
				}
				fileInputEl.value = '';
				updatePreviewStrip();
			});

			// ── Streaming helpers ─────────────────────────────────────────────────────
			function startStream(msgId) {
				if (streaming) finalizeStream();
				const bubble = addRow('assistant', msgId);
				const cursor = document.createElement('span');
				cursor.className = 'cursor';
				bubble.appendChild(cursor);
				streaming = { id: msgId, bubbleEl: bubble, text: '', cursor };
			}

			function appendChunk(delta) {
				if (!streaming) return;
				streaming.text += delta;
				const { bubbleEl, cursor, text } = streaming;
				// Render markdown live during streaming
				bubbleEl.innerHTML = '';
				const content = renderMarkdown(text);
				bubbleEl.appendChild(content);
				bubbleEl.appendChild(cursor);
				scrollBottom();
			}

			function finalizeStream() {
				if (!streaming) return;
				const { bubbleEl, cursor, text, id } = streaming;
				if (bubbleEl.contains(cursor)) bubbleEl.removeChild(cursor);
				// Final clean render
				bubbleEl.innerHTML = '';
				bubbleEl.appendChild(renderMarkdown(text));
				if (!messages.some((m) => m.id === id)) {
					messages.push({
						id,
						role: 'assistant',
						content: text,
						parts: [{ type: 'text', text }],
						createdAt: new Date().toISOString(),
					});
				}
				streaming = null;
				setBusy(false);
			}

			// ── New conversation ──────────────────────────────────────────────────────
			function newConversation() {
				if (streaming) finalizeStream();
				messages = [];
				pendingImages = [];
				updatePreviewStrip();
				instanceId = crypto.randomUUID();
				localStorage.setItem('ib_instance', instanceId);
				renderAll();
				if (ws) ws.close();
			}

			newChatBtn.addEventListener('click', newConversation);

			// ── WebSocket ─────────────────────────────────────────────────────────────
			function connect() {
				const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
				// Pass the API key as a query param — browsers can't set custom headers
				// on WebSocket upgrades, so this is the standard approach.
				// The worker reads it from the URL and validates against KV.
				const keyParam = IB_PARAMS.apiKey ? `?ib_key=${encodeURIComponent(IB_PARAMS.apiKey)}` : '';
				ws = new WebSocket(`${proto}//${location.host}/agents/chat-agent/${instanceId}${keyParam}`);

				ws.onopen = () => {
					setConnected(true);
					retryDelay = 1000;
				};

				ws.onclose = () => {
					setConnected(false);
					finalizeStream();
					setBusy(false);
					ws = null;
					setTimeout(connect, retryDelay);
					retryDelay = Math.min(retryDelay * 2, 16000);
				};

				ws.onerror = () => ws.close();

				ws.onmessage = (evt) => {
					let data;
					try {
						data = JSON.parse(evt.data);
					} catch {
						return;
					}
					onAgentMessage(data);
				};
			}

			function onAgentMessage(data) {
				switch (data.type) {
					case 'rpc': {
						const p = pendingRpc.get(data.id);
						if (p) {
							pendingRpc.delete(data.id);
							if (data.success) p.resolve(data.result);
							else p.reject(new Error(data.error ?? 'RPC error'));
						}
						break;
					}

					case 'cf_agent_mcp_servers':
						renderAddons(data.mcp);
						break;

					case 'cf_agent_chat_messages':
						if (Array.isArray(data.messages) && !streaming) {
							messages = data.messages;
							renderAll();
						}
						break;

					case 'cf_agent_use_chat_response': {
						const { body, done, id: reqId } = data;

						if (body) {
							let chunk;
							try {
								chunk = JSON.parse(body);
							} catch {
								break;
							}

							switch (chunk.type) {
								case 'start':
									startStream(chunk.messageId ?? reqId);
									break;
								case 'text-delta':
									if (!streaming) startStream(reqId);
									appendChunk(chunk.delta ?? chunk.textDelta ?? '');
									break;
								case 'tool-call':
									addToolPill(chunk.toolName ?? chunk.name ?? 'tool');
									break;
								case 'finish':
									finalizeStream();
									break;
								case 'error':
									if (streaming) {
										streaming.text += `\n\n*[Error: ${chunk.errorText ?? 'unknown'}]*`;
										finalizeStream();
									}
									break;
							}
						}

						if (done) finalizeStream();
						break;
					}

					case 'cf_agent_state':
						if (data.state?.messages && !streaming) {
							messages = data.state.messages;
							renderAll();
						}
						break;
				}
			}

			// ── Sending ───────────────────────────────────────────────────────────────
			function send() {
				const text = inputEl.value.trim();
				if ((!text && !pendingImages.length) || busy || !ws || ws.readyState !== WebSocket.OPEN) return;

				const parts = [];
				if (text) parts.push({ type: 'text', text });
				for (const img of pendingImages) {
					parts.push({ type: 'file', mediaType: img.mimeType, url: img.dataUrl, filename: img.filename });
				}

				const userMsg = {
					id: crypto.randomUUID(),
					role: 'user',
					content: text || ' ',
					parts,
					createdAt: new Date().toISOString(),
				};
				messages.push(userMsg);

				const bubble = addRow('user', userMsg.id);
				setBubbleContent(bubble, userMsg);
				scrollBottom();

				pendingImages = [];
				updatePreviewStrip();
				inputEl.value = '';
				inputEl.style.height = 'auto';
				setBusy(true);

				ws.send(
					JSON.stringify({
						type: 'cf_agent_use_chat_request',
						id: crypto.randomUUID(),
						init: {
							method: 'POST',
							body: JSON.stringify({ messages, trigger: 'submit-message' }),
						},
					}),
				);
			}

			// ── Input events ──────────────────────────────────────────────────────────
			inputEl.addEventListener('input', () => {
				inputEl.style.height = 'auto';
				inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
			});

			inputEl.addEventListener('keydown', (e) => {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault();
					send();
				}
			});

			sendBtn.addEventListener('click', send);

			// ── Boot ──────────────────────────────────────────────────────────────────

			// Plan + API key resolution.
			// Priority: URL param ?plan= / ?key=  →  <meta> tags  →  demo defaults.
			// The WordPress plugin and insertabot.io platform embed these via meta tags
			// or append them to the iframe/embed URL.
			const IB_PARAMS = (function resolvePlanParams() {
				const params  = new URLSearchParams(location.search);
				const planMeta = document.querySelector('meta[name="ib-plan"]');
				const keyMeta  = document.querySelector('meta[name="ib-api-key"]');

				const VALID_PLANS = ['demo', 'light', 'plus', 'agent'];
				const plan = (() => {
					const p = params.get('plan') || planMeta?.content || 'demo';
					return VALID_PLANS.includes(p) ? p : 'demo';
				})();
				const apiKey = params.get('key') || keyMeta?.content || null;

				// Feature flags derived from plan
				const PLAN_FEATURES = {
					demo:  { images: true,  mcp: true  },
					light: { images: false, mcp: false },
					plus:  { images: true,  mcp: false },
					agent: { images: true,  mcp: true  },
				};
				const features = PLAN_FEATURES[plan] || PLAN_FEATURES.demo;

				return { plan, apiKey, features };
			})();

			// Apply plan badge + demo banner
			(function applyPlanUI() {
				const badge  = document.getElementById('plan-badge');
				const banner = document.getElementById('demo-banner');
				const labels = {
					demo:  'Demo',
					light: 'Light',
					plus:  'Plus ✦',
					agent: 'Agent ✦✦',
				};
				if (badge) {
					badge.textContent = labels[IB_PARAMS.plan] || 'Demo';
					badge.className   = `plan-badge ${IB_PARAMS.plan}`;
				}
				if (IB_PARAMS.plan === 'demo' && banner) {
					banner.classList.add('visible');
				}
				// Show/hide attach button based on image support
				if (attachBtn) {
					attachBtn.style.display = IB_PARAMS.features.images ? '' : 'none';
				}
				// Hide add-ons button for non-agent plans
				const addonsBtn = document.getElementById('addons-btn');
				if (addonsBtn && !IB_PARAMS.features.mcp) {
					addonsBtn.style.display = 'none';
				}
			})();

			showEmpty();
			connect();
		</script>
	</body>
</html>
