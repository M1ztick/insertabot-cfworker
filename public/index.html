<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsertaBot</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #252525;
      --text: #e4e4e4;
      --text-muted: #666;
      --accent: #7c6af7;
      --accent-border: rgba(124, 106, 247, 0.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { block-size: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-block-end: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    .status {
      margin-inline-start: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .dot {
      inline-size: 7px; block-size: 7px;
      border-radius: 50%;
      background: #333;
      transition: background 0.4s;
    }
    .dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font: inherit;
      font-size: 0.78rem;
      padding: 5px 11px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
      user-select: none;
    }
    .empty-state h2 {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      margin-block-end: 8px;
    }
    .empty-state p { font-size: 0.88rem; line-height: 1.6; max-inline-size: 300px; }

    .msg-row {
      display: flex;
      gap: 10px;
      max-inline-size: 720px;
      inline-size: 100%;
      margin: 0 auto;
      animation: slide-in 0.18s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      inline-size: 30px; block-size: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-block-start: 2px;
    }
    .msg-row.user .avatar { background: var(--accent); color: #fff; }
    .msg-row.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }

    .bubble {
      padding: 9px 13px;
      border-radius: 12px;
      line-height: 1.65;
      font-size: 0.9rem;
      max-inline-size: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--surface2);
      border: 1px solid var(--accent-border);
    }
    .msg-row.assistant .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .msg-img {
      max-inline-size: 100%;
      max-block-size: 260px;
      border-radius: 8px;
      display: block;
      margin-block-start: 6px;
      cursor: pointer;
    }

    /* blinking cursor during streaming */
    .cursor {
      display: inline-block;
      inline-size: 2px; block-size: 0.9em;
      background: var(--accent);
      margin-inline-start: 1px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* tool call indicator */
    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(124, 106, 247, 0.12);
      border: 1px solid rgba(124, 106, 247, 0.25);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.78rem;
      color: #a89cf7;
      margin: 2px 0;
    }

    /* ── Input area ── */
    .input-wrap {
      flex-shrink: 0;
      background: var(--surface);
      border-block-start: 1px solid var(--border);
      padding: 10px 16px 14px;
    }
    #preview-strip {
      display: none;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
      max-inline-size: 720px;
      margin: 0 auto 10px;
    }
    .preview-thumb {
      position: relative;
    }
    .preview-thumb img {
      block-size: 60px;
      inline-size: 60px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
    }
    .preview-remove {
      position: absolute;
      inset-block-start: -6px;
      inset-inline-end: -6px;
      inline-size: 18px;
      block-size: 18px;
      background: #444;
      border: none;
      border-radius: 50%;
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    .preview-remove:hover { background: #666; }
    .input-inner {
      max-inline-size: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    button#attach {
      block-size: 42px;
      inline-size: 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    button#attach:hover { border-color: var(--accent); color: var(--text); }
    button#attach:disabled { opacity: 0.35; cursor: not-allowed; }
    textarea {
      flex: 1;
      min-block-size: 42px;
      max-block-size: 160px;
      padding: 10px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }
    textarea:disabled { opacity: 0.5; cursor: not-allowed; }

    button#send {
      block-size: 42px;
      padding: 0 18px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    button#send:disabled { opacity: 0.35; cursor: not-allowed; }
    button#send:not(:disabled):hover { opacity: 0.82; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-inline-size: 92vw;
      max-block-size: 92vh;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="10" rx="2"/>
    <circle cx="12" cy="5" r="2"/>
    <line x1="12" y1="7" x2="12" y2="11"/>
    <line x1="8" y1="15" x2="8" y2="17"/>
    <line x1="16" y1="15" x2="16" y2="17"/>
  </svg>
  <h1>InsertaBot</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
  <button class="btn-ghost" id="new-chat">New chat</button>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <h2>InsertaBot</h2>
    <p>Ask me anything. I can check the weather, do calculations, schedule tasks, and analyze images.</p>
  </div>
</div>

<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<div class="input-wrap">
  <div id="preview-strip"></div>
  <div class="input-inner">
    <button id="attach" title="Attach image" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <input type="file" id="file-input" accept="image/*" multiple hidden>
    <textarea id="input" placeholder="Message InsertaBot…" rows="1" disabled></textarea>
    <button id="send" disabled>Send</button>
  </div>
</div>

<script>
  const msgList      = document.getElementById('messages');
  const inputEl      = document.getElementById('input');
  const sendBtn      = document.getElementById('send');
  const attachBtn    = document.getElementById('attach');
  const fileInputEl  = document.getElementById('file-input');
  const previewStrip = document.getElementById('preview-strip');
  const newChatBtn   = document.getElementById('new-chat');
  const dot          = document.getElementById('dot');
  const statusTxt    = document.getElementById('status-text');
  const lightbox     = document.getElementById('lightbox');
  const lightboxImg  = document.getElementById('lightbox-img');

  // ── Per-browser session ──────────────────────────────────────────────────
  let instanceId = localStorage.getItem('ib_instance');
  if (!instanceId) {
    instanceId = crypto.randomUUID();
    localStorage.setItem('ib_instance', instanceId);
  }

  // ── State ────────────────────────────────────────────────────────────────
  let messages      = [];
  let pendingImages = [];   // [{ dataUrl, mimeType, filename }]
  let streaming     = null; // { id, bubbleEl, text }
  let busy          = false;
  let ws            = null;
  let retryDelay    = 1000;

  // ── UI helpers ───────────────────────────────────────────────────────────
  function setConnected(yes) {
    dot.className         = 'dot' + (yes ? ' on' : '');
    statusTxt.textContent = yes ? 'Connected' : 'Reconnecting…';
    inputEl.disabled      = !yes || busy;
    sendBtn.disabled      = !yes || busy;
    attachBtn.disabled    = !yes || busy;
  }

  function setBusy(yes) {
    busy = yes;
    inputEl.disabled   = yes;
    sendBtn.disabled   = yes;
    attachBtn.disabled = yes;
  }

  function hideEmpty() {
    const el = document.getElementById('empty');
    if (el) el.remove();
  }

  function scrollBottom() {
    msgList.scrollTop = msgList.scrollHeight;
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function addRow(role, id) {
    hideEmpty();
    const avatar = role === 'user' ? 'You' : 'AI';
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    row.dataset.id = id;
    row.innerHTML = `<div class="avatar">${esc(avatar)}</div><div class="bubble"></div>`;
    msgList.appendChild(row);
    scrollBottom();
    return row.querySelector('.bubble');
  }

  function extractText(msg) {
    if (Array.isArray(msg.parts)) {
      const txt = msg.parts.filter(p => p.type === 'text').map(p => p.text).join('');
      if (txt) return txt;
    }
    if (typeof msg.content === 'string') return msg.content;
    return '';
  }

  function setBubbleContent(bubbleEl, msg) {
    bubbleEl.innerHTML = '';
    const text = extractText(msg);
    if (text) {
      const span = document.createElement('span');
      span.textContent = text;
      bubbleEl.appendChild(span);
    }
    const fileParts = Array.isArray(msg.parts) ? msg.parts.filter(p => p.type === 'file') : [];
    for (const fp of fileParts) {
      const img = document.createElement('img');
      img.src = fp.url;
      img.className = 'msg-img';
      img.alt = fp.filename ?? 'image';
      img.addEventListener('click', () => openLightbox(fp.url));
      bubbleEl.appendChild(img);
    }
  }

  // Re-render all persisted messages (used after agent sync)
  function renderAll() {
    const wasEmpty = messages.length === 0;
    msgList.innerHTML = wasEmpty
      ? '<div class="empty-state" id="empty"><h2>InsertaBot</h2><p>Ask me anything. I can check the weather, do calculations, schedule tasks, and analyze images.</p></div>'
      : '';
    for (const m of messages) {
      const bubble = addRow(m.role, m.id);
      setBubbleContent(bubble, m);
    }
    scrollBottom();
  }

  // ── Lightbox ──────────────────────────────────────────────────────────────
  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
  }
  lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

  // ── Image preview strip ───────────────────────────────────────────────────
  function updatePreviewStrip() {
    previewStrip.innerHTML = '';
    previewStrip.style.display = pendingImages.length ? 'flex' : 'none';
    pendingImages.forEach((img, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'preview-thumb';
      const imgEl = document.createElement('img');
      imgEl.src = img.dataUrl;
      imgEl.alt = img.filename;
      const rm = document.createElement('button');
      rm.className = 'preview-remove';
      rm.textContent = '×';
      rm.title = 'Remove';
      rm.addEventListener('click', () => { pendingImages.splice(i, 1); updatePreviewStrip(); });
      wrap.appendChild(imgEl);
      wrap.appendChild(rm);
      previewStrip.appendChild(wrap);
    });
  }

  function readFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve({ dataUrl: reader.result, mimeType: file.type || 'image/jpeg', filename: file.name });
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  attachBtn.addEventListener('click', () => fileInputEl.click());

  fileInputEl.addEventListener('change', async () => {
    const files = Array.from(fileInputEl.files || []);
    for (const file of files) {
      if (pendingImages.length >= 4) break;
      try { pendingImages.push(await readFile(file)); } catch {}
    }
    fileInputEl.value = '';
    updatePreviewStrip();
  });

  // ── Streaming helpers ────────────────────────────────────────────────────
  function startStream(msgId) {
    if (streaming) finalizeStream();
    const bubble = addRow('assistant', msgId);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);
    streaming = { id: msgId, bubbleEl: bubble, text: '', cursor };
  }

  function appendChunk(delta) {
    if (!streaming) return;
    streaming.text += delta;
    const { bubbleEl, cursor, text } = streaming;
    bubbleEl.textContent = text;
    bubbleEl.appendChild(cursor);
    scrollBottom();
  }

  function finalizeStream() {
    if (!streaming) return;
    const { bubbleEl, cursor, text, id } = streaming;
    if (bubbleEl.contains(cursor)) bubbleEl.removeChild(cursor);
    bubbleEl.textContent = text;
    if (!messages.some(m => m.id === id)) {
      messages.push({
        id,
        role: 'assistant',
        content: text,
        parts: [{ type: 'text', text }],
        createdAt: new Date().toISOString(),
      });
    }
    streaming = null;
    setBusy(false);
  }

  // ── New conversation ──────────────────────────────────────────────────────
  function newConversation() {
    if (streaming) finalizeStream();
    messages = [];
    pendingImages = [];
    updatePreviewStrip();
    instanceId = crypto.randomUUID();
    localStorage.setItem('ib_instance', instanceId);
    renderAll();
    if (ws) ws.close(); // onclose reconnects with new instanceId
  }

  newChatBtn.addEventListener('click', newConversation);

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/agents/chat-agent/${instanceId}`);

    ws.onopen = () => {
      setConnected(true);
      retryDelay = 1000;
    };

    ws.onclose = () => {
      setConnected(false);
      finalizeStream();
      setBusy(false);
      ws = null;
      setTimeout(connect, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 16000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }
      onAgentMessage(data);
    };
  }

  function onAgentMessage(data) {
    switch (data.type) {

      case 'cf_agent_chat_messages':
        if (Array.isArray(data.messages) && !streaming) {
          messages = data.messages;
          renderAll();
        }
        break;

      case 'cf_agent_use_chat_response': {
        const { body, done, id: reqId } = data;

        if (body) {
          let chunk;
          try { chunk = JSON.parse(body); } catch { break; }

          switch (chunk.type) {
            case 'start':
              startStream(chunk.messageId ?? reqId);
              break;
            case 'text-delta':
              if (!streaming) startStream(reqId);
              appendChunk(chunk.delta ?? chunk.textDelta ?? '');
              break;
            case 'finish':
              finalizeStream();
              break;
            case 'error':
              if (streaming) {
                streaming.text += `\n[Error: ${chunk.errorText ?? 'unknown'}]`;
                finalizeStream();
              }
              break;
          }
        }

        if (done) finalizeStream();
        break;
      }

      case 'cf_agent_state':
        if (data.state?.messages && !streaming) {
          messages = data.state.messages;
          renderAll();
        }
        break;
    }
  }

  // ── Sending ───────────────────────────────────────────────────────────────
  function send() {
    const text = inputEl.value.trim();
    if ((!text && !pendingImages.length) || busy || !ws || ws.readyState !== WebSocket.OPEN) return;

    const parts = [];
    if (text) parts.push({ type: 'text', text });
    for (const img of pendingImages) {
      parts.push({ type: 'file', mediaType: img.mimeType, url: img.dataUrl, filename: img.filename });
    }

    const userMsg = {
      id: crypto.randomUUID(),
      role: 'user',
      content: text || ' ',
      parts,
      createdAt: new Date().toISOString(),
    };
    messages.push(userMsg);

    const bubble = addRow('user', userMsg.id);
    setBubbleContent(bubble, userMsg);
    scrollBottom();

    pendingImages = [];
    updatePreviewStrip();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setBusy(true);

    ws.send(JSON.stringify({
      type: 'cf_agent_use_chat_request',
      id: crypto.randomUUID(),
      init: {
        method: 'POST',
        body: JSON.stringify({ messages, trigger: 'submit-message' }),
      },
    }));
  }

  // ── Input events ──────────────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  // ── Boot ──────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
